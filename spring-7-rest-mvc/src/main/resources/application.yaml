# application.yaml
spring:
  application:
    name: spring-7-rest-mvc
  flyway:
    enabled: true
  docker:
    compose:
      enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000
    user:
      name: user1
      password: password
  # Java Virtual Threads
  threads:
    virtual:
      enabled: true
  # caching
  cache:
    cache-names:
      - beerCache
      - beerListCache
      - customerCache
      - customerListCache

#  jpa:
