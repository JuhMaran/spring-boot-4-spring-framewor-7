#          schema-generation:
#            scripts:
#              action: drop-and-create
#              create-source: metadata
#              drop-target: drop-and-create.sql
#              create-target: drop-and-create.sql

# Actuator Kubernetes Integration
management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true

logging:
  level:
    root: info # em produção
    sql: warn # em produção
    org.zalando.logbook: trace  # em produção trocar para INFO
    org.springframework: debug