server:
  port: 8082
spring:
  application:
    name: spring-7-reactive
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000

# Spring Boot Actuator
management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true

#logging:
#  level:
#    org.springframework.r2dbc: trace

debug: true